<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ludo PRO</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
}

#board {
  display: block;
}

#ui {
  position: fixed;
  bottom: 20px;
  width: 100%;
  text-align: center;
}

button {
  padding: 14px 28px;
  font-size: 18px;
  background: orange;
  border: none;
  border-radius: 10px;
  color: white;
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

#navbat {
  color: white;
  margin-top: 10px;
}
</style>
</head>

<body>

<canvas id="board"></canvas>

<div id="ui">
  <button onclick="rollDice()">Taslaw 🎲</button>
  <div id="navbat">Navbat: 🔴</div>
</div>

<script>
const canvas = document.getElementById("board");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

const total = 100;
const path = [];

// 🌳 FON RASM
const bg = new Image();
bg.src = "https://i.imgur.com/8wKQZ5M.jpg"; // o‘rmon fon

// 🎯 YO‘LAK (snake)
function generatePath() {
  path.length = 0;

  const margin = 60;
  const cols = 10;
  const rows = 10;

  const cellW = (canvas.width - margin * 2) / cols;
  const cellH = (canvas.height - margin * 2) / rows;

  for (let y = 0; y < rows; y++) {
    if (y % 2 === 0) {
      for (let x = 0; x < cols; x++) {
        path.push({
          x: margin + x * cellW + cellW / 2,
          y: margin + y * cellH + cellH / 2
        });
      }
    } else {
      for (let x = cols - 1; x >= 0; x--) {
        path.push({
          x: margin + x * cellW + cellW / 2,
          y: margin + y * cellH + cellH / 2
        });
      }
    }
  }
}

// 🎮 O‘yinchilar
const players = [
  { color: "red", pos: 0 },
  { color: "blue", pos: 0 },
  { color: "green", pos: 0 },
  { color: "yellow", pos: 0 }
];

let current = 0;

// 🎲 Zar
function rollDice() {
  const dice = Math.floor(Math.random() * 6) + 1;

  players[current].pos += dice;

  if (players[current].pos >= total) {
    alert(players[current].color + " yutdi!");
    players[current].pos = total - 1;
  }

  current = (current + 1) % players.length;
  updateTurn();
}

// 🔄 Navbat
function updateTurn() {
  const icons = ["🔴","🔵","🟢","🟡"];
  document.getElementById("navbat").innerText =
    "Navbat: " + icons[current];
}

// ⭐ MAXSUS KETEKLAR
const special = {
  freeze: [10, 25, 44, 70],
  back: [15, 55],
  bonus: [5, 33, 66, 88],
  prize: [20, 50, 75, 95]
};

function applyEffects(player) {
  if (special.freeze.includes(player.pos)) {
    alert("❄️ Muzlaw!");
    current = (current + 1) % players.length;
  }
  if (special.back.includes(player.pos)) {
    player.pos -= 5;
  }
  if (special.bonus.includes(player.pos)) {
    player.pos += 3;
  }
  if (special.prize.includes(player.pos)) {
    alert("🎁 Priz!");
  }
}

// 🎨 CHIZISH
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // 🌳 fon
  if (bg.complete) {
    ctx.drawImage(bg, 0, 0, canvas.width, canvas.height);
  }

  // kataklar
  path.forEach((p, i) => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, 16, 0, Math.PI * 2);

    ctx.fillStyle = "#d6b98c";

    if (special.freeze.includes(i)) ctx.fillStyle = "#4fc3f7";
    if (special.back.includes(i)) ctx.fillStyle = "#000";
    if (special.bonus.includes(i)) ctx.fillStyle = "gold";
    if (special.prize.includes(i)) ctx.fillStyle = "lime";

    ctx.fill();

    ctx.fillStyle = "#000";
    ctx.font = "10px Arial";
    ctx.textAlign = "center";
    ctx.fillText(i + 1, p.x, p.y + 3);
  });

  // donachalar
  players.forEach((pl, i) => {
    const pos = path[pl.pos];
    if (!pos) return;

    const offset = i * 5;

    ctx.beginPath();
    ctx.arc(pos.x + offset, pos.y + offset, 8, 0, Math.PI * 2);
    ctx.fillStyle = pl.color;
    ctx.fill();
    ctx.strokeStyle = "#fff";
    ctx.stroke();
  });

  // START / FINISH
  ctx.fillStyle = "white";
  ctx.fillText("START", path[0].x, path[0].y - 20);
  ctx.fillText("FINISH", path[99].x, path[99].y - 20);
}

// 🔁 LOOP
function loop() {
  generatePath();
  draw();
  requestAnimationFrame(loop);
}

updateTurn();
loop();
</script>

</body>
</html>
