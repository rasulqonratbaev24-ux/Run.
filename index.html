<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ludo Race</title>

<style>
body {
  margin: 0;
  background: #0f172a;
  font-family: Arial;
}

#board {
  display: block;
}

#ui {
  position: fixed;
  bottom: 20px;
  width: 100%;
  text-align: center;
}

button {
  padding: 12px 25px;
  font-size: 18px;
  background: orange;
  border: none;
  border-radius: 8px;
  color: white;
}
</style>
</head>

<body>

<canvas id="board"></canvas>

<div id="ui">
  <button onclick="rollDice()">Taslaw 🎲</button>
  <div id="navbat">Navbat: 🔴</div>
</div>

<script>
const canvas = document.getElementById("board");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

const total = 100;
const path = [];

// 🎯 Snake-style yo‘l (egri, chiroyli)
function generatePath() {
  path.length = 0;

  const margin = 40;
  const cols = 10;
  const rows = 10;

  const cellW = (canvas.width - margin * 2) / cols;
  const cellH = (canvas.height - margin * 2) / rows;

  let count = 0;

  for (let y = 0; y < rows; y++) {
    if (y % 2 === 0) {
      for (let x = 0; x < cols; x++) {
        path.push({
          x: margin + x * cellW + cellW / 2,
          y: margin + y * cellH + cellH / 2
        });
        count++;
      }
    } else {
      for (let x = cols - 1; x >= 0; x--) {
        path.push({
          x: margin + x * cellW + cellW / 2,
          y: margin + y * cellH + cellH / 2
        });
        count++;
      }
    }
  }
}

// 🎮 O‘yinchilar
const players = [
  { color: "red", pos: 0 },
  { color: "blue", pos: 0 },
  { color: "green", pos: 0 },
  { color: "yellow", pos: 0 }
];

let current = 0;

// 🎲 Zar
function rollDice() {
  const dice = Math.floor(Math.random() * 6) + 1;

  players[current].pos += dice;

  if (players[current].pos >= total) {
    alert(players[current].color + " yutdi!");
    players[current].pos = total - 1;
  }

  current = (current + 1) % players.length;
  updateTurn();
}

// 🔄 Navbat
function updateTurn() {
  const icons = ["🔴", "🔵", "🟢", "🟡"];
  document.getElementById("navbat").innerText =
    "Navbat: " + icons[current];
}

// 🎨 Chizish
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Kataklar
  path.forEach((p, i) => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, 16, 0, Math.PI * 2);
    ctx.fillStyle = "#d6b98c";
    ctx.fill();

    ctx.fillStyle = "#000";
    ctx.font = "10px Arial";
    ctx.textAlign = "center";
    ctx.fillText(i + 1, p.x, p.y + 3);
  });

  // 🔴🔵🟢🟡 Donachalar
  players.forEach((pl, i) => {
    const pos = path[pl.pos];
    if (!pos) return;

    const offset = i * 5;

    ctx.beginPath();
    ctx.arc(pos.x + offset, pos.y + offset, 8, 0, Math.PI * 2);
    ctx.fillStyle = pl.color;
    ctx.fill();

    ctx.lineWidth = 2;
    ctx.strokeStyle = "#fff";
    ctx.stroke();
  });
}

// 🔁 Loop
function loop() {
  generatePath();
  draw();
  requestAnimationFrame(loop);
}

updateTurn();
loop();
</script>

</body>
</html>
