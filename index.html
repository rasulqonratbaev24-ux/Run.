<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ludo Race</title>

<style>
body {
  margin: 0;
  background: #0f172a;
  overflow: hidden;
  font-family: Arial;
}

#board {
  display: block;
}

#ui {
  position: fixed;
  bottom: 20px;
  width: 100%;
  text-align: center;
}

button {
  padding: 12px 25px;
  font-size: 18px;
  background: orange;
  border: none;
  border-radius: 8px;
  color: white;
}
</style>
</head>

<body>

<canvas id="board"></canvas>

<div id="ui">
  <button onclick="rollDice()">Taslaw 🎲</button>
  <div id="navbat">Navbat: 🔴</div>
</div>

<script>
const canvas = document.getElementById("board");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

const total = 100;
const path = [];

// 🔵 O‘yinchilar (Ludo donachalar)
const players = [
  { color: "red", pos: 0 },
  { color: "blue", pos: 0 },
  { color: "green", pos: 0 },
  { color: "yellow", pos: 0 }
];

let current = 0;

// 🎲 Zar tashlash
function rollDice() {
  const dice = Math.floor(Math.random() * 6) + 1;

  players[current].pos += dice;
  if (players[current].pos >= total) {
    alert(players[current].color + " yutdi!");
    players[current].pos = total - 1;
  }

  current = (current + 1) % players.length;
  updateTurn();
}

// 🔄 Navbat ko‘rsatish
function updateTurn() {
  const colors = ["🔴", "🔵", "🟢", "🟡"];
  document.getElementById("navbat").innerText =
    "Navbat: " + colors[current];
}

// 📍 Yo‘lak generatsiya (spiral)
function generatePath() {
  path.length = 0;

  const centerX = canvas.width / 2;
  const centerY = canvas.height / 2;

  const scale = Math.min(canvas.width, canvas.height) / 25;

  for (let i = 0; i < total; i++) {
    const angle = i * 0.25;
    const radius = i * 0.6;

    const x = centerX + Math.cos(angle) * radius * scale;
    const y = centerY + Math.sin(angle) * radius * scale;

    path.push({ x, y });
  }
}

// 🎨 Chizish
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Yo‘lak
  path.forEach((p, i) => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, 14, 0, Math.PI * 2);
    ctx.fillStyle = "#d6b98c";
    ctx.fill();

    ctx.fillStyle = "#000";
    ctx.font = "10px Arial";
    ctx.textAlign = "center";
    ctx.fillText(i + 1, p.x, p.y + 3);
  });

  // 🔴🔵🟢🟡 DONACHALAR
  players.forEach((pl, i) => {
    const pos = path[pl.pos];
    if (!pos) return;

    ctx.beginPath();
    ctx.arc(pos.x, pos.y, 8, 0, Math.PI * 2);
    ctx.fillStyle = pl.color;
    ctx.fill();

    ctx.lineWidth = 2;
    ctx.strokeStyle = "white";
    ctx.stroke();
  });
}

// 🔁 Loop
function loop() {
  generatePath();
  draw();
  requestAnimationFrame(loop);
}

updateTurn();
loop();
</script>

</body>
</html>
